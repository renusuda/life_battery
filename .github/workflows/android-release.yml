name: Android Release

on:
  workflow_dispatch:
    inputs:
      track:
        description: "Play Store track"
        required: true
        default: "internal"
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production
      release_notes_en:
        description: "Release notes - English (max 500 chars)"
        required: true
        default: "・Bug fixes and improvements"
        type: string
      release_notes_ja:
        description: "Release notes - Japanese (max 500 chars)"
        required: true
        default: "・バグ修正と改善"
        type: string

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: tag
        run: echo "name=$(git describe --tags --abbrev=0)" >> "$GITHUB_OUTPUT"

      - name: Setup Flutter
        uses: ./.github/actions/setup-flutter

      - name: Create firebase_options.dart
        run: echo "${{ secrets.FIREBASE_OPTIONS_DART_BASE64 }}" | base64 --decode > lib/firebase_options.dart

      - name: Create google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > android/app/google-services.json

      - name: Decode keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/upload-keystore.jks

      - name: Create key.properties
        run: |
          cat > android/key.properties <<EOL
          storeFile=../upload-keystore.jks
          storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOL

      - name: Create release notes
        run: |
          mkdir -p distribution/whatsnew
          echo "${NOTES_EN:0:500}" > distribution/whatsnew/whatsnew-en-US
          echo "${NOTES_JA:0:500}" > distribution/whatsnew/whatsnew-ja-JP
        env:
          NOTES_EN: ${{ github.event.inputs.release_notes_en }}
          NOTES_JA: ${{ github.event.inputs.release_notes_ja }}

      - name: Build AAB
        run: flutter build appbundle --release

      - name: Upload AAB to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.rururu.lifebt
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: ${{ github.event.inputs.track || 'internal' }}
          releaseName: ${{ steps.tag.outputs.name }}
          whatsNewDirectory: distribution/whatsnew

  notify-slack:
    runs-on: ubuntu-latest
    needs: [build-and-deploy]
    if: always()
    steps:
      - name: Notify release result to Slack
        uses: slackapi/slack-github-action@v2.1.1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "Android Release ${{ needs.build-and-deploy.result == 'success' && '✅' || '❌' }}\nTrack: ${{ github.event.inputs.track }}"
            }
